<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduLib Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* White/Light Blue Gradient Background */
            background: radial-gradient(circle at top right, #ffffff, #f0f7f4, #eef2f3);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .landing-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* --- Glassmorphism Effect for Light Theme --- */
        .role-card {
            background: rgba(255, 255, 255, 0.7); /* More opaque for light theme */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            color: #2c3e50;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            height: 100%;
            /* Soft Shadow */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .role-card:hover {
            transform: translateY(-12px);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 40px rgba(46, 204, 113, 0.15); /* Soft green shadow */
            border: 1px solid #2ecc71;
        }

        .role-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 32px;
            color: white;
        }

        /* Updated Color Palette: Blue and Green */
        .admin-icon { background: linear-gradient(135deg, #2980b9 0%, #3498db 100%); } /* Blue */
        .teacher-icon { background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%); } /* Green */
        .student-icon { background: linear-gradient(135deg, #1abc9c 0%, #3498db 100%); } /* Teal/Blue */

        .btn-role {
            padding: 10px 25px;
            border-radius: 12px;
            border: 2px solid transparent;
            font-weight: 600;
            margin-top: 20px;
            transition: 0.3s;
            background: #f8f9fa;
            color: #2c3e50;
        }

        /* Admin Button - Blue */
        .role-card:nth-child(1):hover .btn-role {
            background: #3498db;
            color: white;
        }

        /* Teacher Button - Green */
        .role-card:hover .btn-role {
            background: #2ecc71;
            color: white;
        }

        .system-title {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 60px;
        }

        .system-title h1 {
            font-size: 3rem;
            font-weight: 800;
            color: #2c3e50;
        }

        .system-title h1 span {
            color: #27ae60; /* Highlight Green */
        }

        .text-muted-glass {
            color: #7f8c8d;
            font-size: 0.95rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="container">
            <div class="system-title">
                <h1><i class="fas fa-graduation-cap me-3 text-primary"></i>Edu<span>Lib</span></h1>
                <p class="lead fw-light">Modern Library & Student Information Management</p>
            </div>
            
            <div class="row g-4 justify-content-center">
                <div class="col-md-4">
                    <div class="role-card" onclick="location.href='admin-dashboard.html'">
                        <div class="role-icon admin-icon">
                            <i class="fas fa-user-shield"></i>
                        </div>
                        <h4 class="fw-bold">Administrator</h4>
                        <p class="text-muted-glass">System configuration, security, and user management.</p>
                        <button class="btn btn-role">Login Admin</button>
                    </div>
                </div>
                
                <div class="col-md-4">
                    <div class="role-card" onclick="location.href='teacher-dashboard.html'">
                        <div class="role-icon teacher-icon">
                            <i class="fas fa-chalkboard-teacher"></i>
                        </div>
                        <h4 class="fw-bold">Teacher</h4>
                        <p class="text-muted-glass">Manage units, track scores, and view student progress.</p>
                        <button class="btn btn-role">Login Faculty</button>
                    </div>
                </div>
                
                <div class="col-md-4">
                    <div class="role-card" onclick="location.href='student-dashboard.html'">
                        <div class="role-icon student-icon">
                            <i class="fas fa-user-graduate"></i>
                        </div>
                        <h4 class="fw-bold">Student</h4>
                        <p class="text-muted-glass">Resource search, book borrowing, and result slips.</p>
                        <button class="btn btn-role">Login Student</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
